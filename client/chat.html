<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 채팅방</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: #e9ecef; display: flex; flex-direction: column; height: 100vh; }
    header { background: #343a40; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
    #chatBox { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg { background: white; padding: 10px; border-radius: 8px; max-width: 70%; width: fit-content; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .msg.me { background: #d2e3fc; align-self: flex-end; }
    .msg .sender { font-size: 12px; color: #666; margin-bottom: 3px; font-weight: bold; }
    .msg .time { font-size: 10px; color: #999; text-align: right; margin-top: 3px; }
    .input-area { display: flex; padding: 10px; background: white; border-top: 1px solid #ddd; }
    #msgInput { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
    #sendBtn { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; margin-left: 10px; cursor: pointer; }
  </style>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <header id="roomTitle">채팅방</header>
  <div id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) send()">
    <button id="sendBtn" onclick="send()">전송</button>
  </div>

  <script>
    const username = sessionStorage.getItem('username');
    if (!username) {
      alert('로그인이 필요합니다!');
      window.location.href = 'login.html';
    }

    document.getElementById('roomTitle').innerText = `${username}님의 채팅방`;

    const socket = io('https://chat-app-qylu.onrender.com');

    socket.emit('join', username);

    socket.on('message', (data) => {
      const chatBox = document.getElementById('chatBox');
      const msgDiv = document.createElement('div');
      
      msgDiv.classList.add('msg');
      if (data.sender === username) {
        msgDiv.classList.add('me');
      }

      msgDiv.innerHTML = `
        <div class="sender">${data.sender}</div>
        <div>${data.text}</div>
        <div class="time">${data.timestamp}</div>
      `;
      
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    function send() {
      const input = document.getElementById('msgInput');
      if (!input.value.trim()) return;

      socket.emit('sendMessage', {
        sender: username,
        text: input.value
      });

      input.value = '';
    }
  </script>
</body>
</html>
